<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Boletos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <button onclick="logout()" class="btn-logout">
      🚪 Sair do Sistema
    </button>

    <h1>Gerenciador de Boletos</h1>

    <!-- FORMULÁRIO -->
    <form class="formulario" autocomplete="off">

      <div class="campo">
        <label for="nome">Nome do boleto</label>
        <input type="text" id="nome" placeholder="Ex: Internet">
      </div>

      <div class="campo">
        <label for="valor">Valor</label>
        <input type="text" id="valor" placeholder="0,00">
      </div>

      <div class="campo">
        <label for="vencimento">Vencimento</label>
        <input type="date" id="vencimento">
      </div>

      <button type="button" id="salvar">
        Salvar boleto
      </button>

    </form>

    <!-- ALERTA -->
    <div class="alerta" id="alerta">
      Nenhum boleto vencendo hoje.
    </div>

    <div class="filtros">

      <button onclick="filtrarBoletos('todos')">
        Todos
      </button>

      <button onclick="filtrarBoletos('pendentes')">
        A vencer
      </button>

      <button onclick="filtrarBoletos('hoje')">
        Hoje
      </button>

      <button onclick="filtrarBoletos('atrasados')">
        Atrasados
      </button>

      <button onclick="filtrarBoletos('pagos')">
        Pagos
      </button>

    </div>

    <!-- LISTA -->
    <div class="lista-boletos">

      <h2>Boletos cadastrados</h2>

      <div id="lista"></div>

    </div>

  </div>

  <div id="toast"></div>
  <script src="script.js"></script>
</body>

</html>
