<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Boletos</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Gerenciador de Boletos</h1>

    <!-- FORMULÁRIO -->
    <div class="formulario">

      <div class="campo">
        <label for="nome">Nome do boleto</label>
        <input type="text" id="nome" placeholder="Ex: Internet">
      </div>

      <div class="campo">
        <label for="valor">Valor</label>
        <input type="text" id="valor" placeholder="0,00">
      </div>

      <div class="campo">
        <label for="vencimento">Vencimento</label>
        <input type="date" id="vencimento">
      </div>

      <button id="salvar">
        Salvar boleto
      </button>

    </div>

    <!-- ALERTA -->
    <div class="alerta" id="alerta">
      Nenhum boleto vencendo hoje.
    </div>

    <div class="filtros">

      <button onclick="filtrarBoletos('todos')">
        Todos
      </button>

      <button onclick="filtrarBoletos('pendentes')">
        A vencer
      </button>

      <button onclick="filtrarBoletos('hoje')">
        Hoje
      </button>

      <button onclick="filtrarBoletos('atrasados')">
        Atrasados
      </button>

      <button onclick="filtrarBoletos('pagos')">
        Pagos
      </button>

    </div>

    <!-- LISTA -->
    <div class="lista-boletos">

      <h2>Boletos cadastrados</h2>

      <div id="lista">

        <!-- EXEMPLO -->
        <div class="boleto">

          <div class="info">
            <h3>Internet</h3>
            <p>R$ 99,90</p>
            <span>Vence em: 10/05/2026</span>
          </div>

          <div class="acoes">
            <button class="pago">Pago</button>
            <button class="excluir">Excluir</button>
          </div>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>
  <div id="toast"></div>
</body>

</html>
